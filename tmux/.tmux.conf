# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'alexekdahl/tmux-compile'
set -g @plugin 'kristijanhusak/tmux-simple-git-status'

##########################################

# Gruvbox
set -g @gruvbox_bg0      "#282828"
set -g @gruvbox_bg1      "#3c3836"
set -g @gruvbox_bg2      "#504945"
set -g @gruvbox_bg4      "#7c6f64"
set -g @gruvbox_fg1      "#ebdbb2"
set -g @gruvbox_yellow   "#fabd2f"
set -g @gruvbox_green    "#b8bb26"
set -g @gruvbox_aqua     "#8ec07c"
set -g @gruvbox_orange   "#fe8019"
set -g @gruvbox_red      "#fb4934"

set -g status-style              "bg=#282828,fg=#ebdbb2"
set -g status-left-length         50
set -g status-right-length        100

set -g status-left  "#[bg=#fabd2f,fg=#282828,bold] #S #[bg=#282828,fg=#fabd2f]"
set -g status-right "#{simple_git_status}#[bg=#504945,fg=#ebdbb2] %H:%M #[bg=#fabd2f,fg=#282828,bold] %d %b "

set -g window-status-format         " #I:#W "
set -g window-status-style          "bg=#3c3836,fg=#928374"

set -g window-status-current-format " #I:#W "
set -g window-status-current-style  "bg=#504945,fg=#fabd2f,bold"

set -g pane-border-style        "fg=#504945"
set -g pane-active-border-style "fg=#fabd2f"

set -g message-style        "bg=#fabd2f,fg=#282828,bold"
set -g message-command-style "bg=#282828,fg=#fabd2f"

setw -g mode-style "bg=#504945,fg=#fabd2f,bold"

##########################################

# Core
set -g status-right-length 100
set -g status-right "#{simple_git_status}"
set-option -g bell-action none
set-option -g visual-bell off
setw -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10
set -g status-interval 5
set-option -g focus-events on

# Non-login shell
set -g default-command "${SHELL}"

##########################################

# Splits
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Pane Navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Window Navigation
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

bind -n M-h previous-window
bind -n M-l next-window

##########################################

# Keybindings
set -g @compile-mode-recompile-key "C-l"

##########################################

# TPM
run '~/.tmux/plugins/tpm/bin/install_plugins'
run '~/.tmux/plugins/tpm/tpm'