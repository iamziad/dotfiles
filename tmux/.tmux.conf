# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

set-option -g bell-action none
set-option -g visual-bell off

# Terminal & Color Fixes
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10
set-option -g focus-events on

# Status Bar
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
#set -g status-style "bg=#181616,fg=#727169"
set -g status-style "bg=#282828,fg=#727169"
set -g status-left-length 20
set -g status-left "#[fg=#76946a,bold] #S "
setw -g window-status-format "#[fg=#727169] #I:#W "
setw -g window-status-current-format "#[fg=#c5c9c5,bold] #I:#W "
set -g status-right-length 50
set -g status-right "#[fg=#727169] %H:%M "

# Pane & Message Styles
set -g pane-border-style "fg=#282727"
set -g pane-active-border-style "fg=#2d4f67"
set -g message-style "fg=#c5c9c5,bg=#181616"

##########################################

# Splits
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Pane Navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Window Navigation
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

bind -n M-h previous-window
bind -n M-l next-window

##########################################

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/bin/install_plugins'
run '~/.tmux/plugins/tpm/tpm'
