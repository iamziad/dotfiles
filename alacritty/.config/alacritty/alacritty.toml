[general]
live_config_reload = true
import = [
    "~/.config/alacritty/themes/gruvbox_dark.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding = { x = 10, y = 10 }
opacity = 1.0
# decorations = "None"

[scrolling]
history = 5000

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
unfocused_hollow = true

[bell]
animation = "EaseOutExpo"
duration = 0
