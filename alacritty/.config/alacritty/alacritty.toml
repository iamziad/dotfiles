# Alacritty Configuration — Kanagawa Dragon
# Converted from Kitty config

[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
padding = { x = 2, y = 2 }
opacity = 0.90
# decorations = "None"  # Uncomment to hide window decorations

[scrolling]
history = 5000

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

# Note: Alacritty does not support ligatures natively.
# For ligature support, consider using WezTerm or Kitty.

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
unfocused_hollow = true

# Note: cursor_trail is not supported in Alacritty.

[bell]
animation = "EaseOutExpo"
duration = 0

